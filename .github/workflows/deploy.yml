name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  REGISTRY: registry.digitalocean.com/conozco-registry
  IMAGE_NAME: flashcards-app
  IMAGE_TAG: sha-${{ github.sha }}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DigitalOcean Container Registry
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}
      - name: DOCR login
        run: doctl registry login --expiry-seconds 600
      - name: Build and push image
        run: |
          docker buildx build \
            -f Dockerfile.prod \
            -t $REGISTRY/$IMAGE_NAME:${IMAGE_TAG} \
            --push .

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCR_READ_TOKEN: ${{ secrets.DOCR_READ_TOKEN }}
          ADMIN_REGISTRATION_PASSWORD: ${{ secrets.ADMIN_REGISTRATION_PASSWORD }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: REGISTRY,IMAGE_NAME,IMAGE_TAG,DOCR_READ_TOKEN,ADMIN_REGISTRATION_PASSWORD,DB_PASSWORD,DATABASE_URL,NEXTAUTH_SECRET,NEXTAUTH_URL,RESEND_API_KEY,EMAIL_FROM,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,DEEPL_API_KEY,COMMIT_HASH
          script: |
            set -euo pipefail
            cd /opt/flashcards

            # Login to DOCR (requires doctl or docker login on server)
            if command -v doctl >/dev/null 2>&1; then
              echo "Logging to DOCR via doctl..."
              doctl registry login --expiry-seconds 600 || true
            else
              echo "Logging to DOCR via docker login..."
              if [ -z "${DOCR_READ_TOKEN:-}" ]; then
                echo "ERROR: DOCR_READ_TOKEN is not set"; exit 1
              fi
              echo "${DOCR_READ_TOKEN}" | docker login registry.digitalocean.com -u doctl-token --password-stdin
            fi

            if [ -z "${IMAGE_TAG:-}" ]; then
              echo "ERROR: IMAGE_TAG is not set"; exit 1; fi
            echo "Deploying image tag: ${IMAGE_TAG}"

            # Validate critical environment variables
            echo "Validating environment variables..."
            MISSING_VARS=""
            for var in DATABASE_URL NEXTAUTH_SECRET NEXTAUTH_URL RESEND_API_KEY EMAIL_FROM GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET DEEPL_API_KEY DB_PASSWORD ADMIN_REGISTRATION_PASSWORD; do
              if [ -z "${!var:-}" ]; then
                MISSING_VARS="${MISSING_VARS}${var} "
              fi
            done

            if [ -n "$MISSING_VARS" ]; then
              echo "ERROR: Missing required environment variables: $MISSING_VARS"
              echo "Please check GitHub Secrets configuration"
              exit 1
            fi
            echo "All required environment variables are set"

            # Create/update .env file with all production variables
            echo "Creating production .env file..."
            {
              echo "# Auto-generated by GitHub Actions - DO NOT EDIT MANUALLY"
              echo "# Last updated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
              echo "# Commit: ${COMMIT_HASH}"
              echo ""
              echo "# Database"
              echo "DATABASE_URL=${DATABASE_URL}"
              echo "DB_PASSWORD=${DB_PASSWORD}"
              echo ""
              echo "# NextAuth"
              echo "NEXTAUTH_SECRET=${NEXTAUTH_SECRET}"
              echo "NEXTAUTH_URL=${NEXTAUTH_URL}"
              echo ""
              echo "# Email Service (Resend)"
              echo "RESEND_API_KEY=${RESEND_API_KEY}"
              echo "EMAIL_FROM=${EMAIL_FROM}"
              echo ""
              echo "# OAuth Providers"
              echo "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}"
              echo "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}"
              echo ""
              echo "# External APIs"
              echo "DEEPL_API_KEY=${DEEPL_API_KEY}"
              echo ""
              echo "# Application"
              echo "NODE_ENV=production"
              echo "IMAGE_TAG=${IMAGE_TAG}"
              echo "ADMIN_REGISTRATION_PASSWORD=${ADMIN_REGISTRATION_PASSWORD}"
            } > /opt/flashcards/.env

            echo ".env file created successfully"
            echo "Verifying .env file contents (secrets masked)..."
            cat /opt/flashcards/.env | grep -E '^[A-Z_]+=.+' | sed 's/=.*/=***/' | head -15

            docker compose -f docker-compose.prod.yml pull
            if ! docker image inspect "$REGISTRY/$IMAGE_NAME:${IMAGE_TAG}" >/dev/null 2>&1; then
              echo "ERROR: Image not found: $REGISTRY/$IMAGE_NAME:${IMAGE_TAG}"; exit 1; fi

            # Create database backup before migrations
            echo "Creating database backup before migrations..."
            BACKUP_SCRIPT="/opt/flashcards/scripts/server-setup/backup-db-prod.sh"
            if [ -f "$BACKUP_SCRIPT" ]; then
              bash "$BACKUP_SCRIPT" || {
                echo "ERROR: Database backup failed. Aborting deployment."
                exit 1
              }
              echo "Database backup completed successfully"
            else
              echo "WARNING: Backup script not found at $BACKUP_SCRIPT"
              echo "Proceeding without backup (NOT RECOMMENDED for production)"
            fi

            # Run schema migrations before starting app
            docker compose -f docker-compose.prod.yml run --rm --no-deps app npx prisma@5.22.0 migrate deploy
            # Apply data migrations after schema migrations
            echo "Applying data migrations..."
            # DATABASE_URL is already set in docker-compose.prod.yml, but we pass it explicitly to ensure it's available
            export GIT_SHA="${{ github.sha }}"
            docker compose -f docker-compose.prod.yml run --rm --no-deps -e GIT_SHA="${GIT_SHA}" app ./scripts/apply-data-migrations.sh
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            echo "Deployment completed at $(date)"
