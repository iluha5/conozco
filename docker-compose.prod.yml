services:
  postgres:
    image: postgres:16-alpine
    container_name: flashcards-db
    restart: always
    environment:
      POSTGRES_USER: flashcards
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: flashcards
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5433:5432' # Temporary: for SSH tunnel connection
    networks:
      - flashcards-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flashcards']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: registry.digitalocean.com/conozco-registry/flashcards-app:${IMAGE_TAG}
    container_name: flashcards-app
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://conozco.net
      NODE_ENV: production
      DEEPL_API_KEY: ${DEEPL_API_KEY}
      ADMIN_REGISTRATION_PASSWORD: ${ADMIN_REGISTRATION_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:8000/api/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - flashcards-network

  nginx:
    image: nginx:alpine
    container_name: flashcards-nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - flashcards-network

volumes:
  postgres_data:

networks:
  flashcards-network:
    driver: bridge
